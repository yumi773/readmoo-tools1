<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Readmoo折扣優惠計算機(單本)</title>
    <style>
        :root {
            --page-bg: #e8e6df;
            --app-bg: #f8f7f2;
            --display-bg: #f2f1eb;
            --key-bg: #d6c9c7; 
            --key-text: #ffffff;
            --gold: #b3a58e;
            --milktea: #917c79; 
            --text-main: #6b6a66;
            --card-bg: #f2f1eb;
            --shadow: rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --page-bg: #1a1b1d;
            --app-bg: #212224;
            --display-bg: #2a2c2f;
            --key-bg: #3a3d42; 
            --key-text: #fefefe;
            --gold: #d4b889;
            --milktea: #917c79;
            --text-main: #fefefe;
            --card-bg: #2a2c2f;
            --shadow: rgba(0,0,0,0.4);
        }

        body {
            font-family: -apple-system, "Noto Sans CJK TC", sans-serif;
            background-color: var(--page-bg);
            margin: 0; padding: 40px 20px;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh;
            transition: 0.3s;
        }

        .app-container {
            width: 100%; max-width: 450px;
            background-color: var(--app-bg);
            border-radius: 40px; 
            padding: 35px 25px;
            box-shadow: 0 20px 50px var(--shadow);
            border: 8px solid var(--display-bg);
        }

        .display-area {
            background-color: var(--display-bg);
            border-radius: 20px; padding: 25px;
            text-align: right; margin-bottom: 20px;
        }
        .display-area .label { color: var(--gold); font-size: 0.9rem; text-align: left; margin-bottom: 10px; font-weight: bold;}
        .display-area .price-symbol { color: var(--gold); font-size: 1.8rem; margin-right: 5px; }
        .display-area .price-val { color: var(--text-main); font-size: 4.5rem; font-weight: 700; }

        /* --- 鍵盤區域：使用地圖佈局確保不會亂掉 --- */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 60px);
            gap: 12px;
            margin-bottom: 25px;
            grid-template-areas: 
                "n7 n8 n9 btnC"
                "n4 n5 n6 btnC"
                "n1 n2 n3 btnC"
                "n0 n00 bk btnC";
        }

        .key {
            background-color: var(--key-bg); color: var(--key-text);
            border: none; border-radius: 12px;
            font-size: 1.5rem; cursor: pointer; font-weight: 600;
            transition: transform 0.1s;
        }
        .key:active { transform: scale(0.95); opacity: 0.8; }

        /* 綁定按鈕到地圖位置 */
        .key-n7 { grid-area: n7; } .key-n8 { grid-area: n8; } .key-n9 { grid-area: n9; }
        .key-n4 { grid-area: n4; } .key-n5 { grid-area: n5; } .key-n6 { grid-area: n6; }
        .key-n1 { grid-area: n1; } .key-n2 { grid-area: n2; } .key-n3 { grid-area: n3; }
        .key-n0 { grid-area: n0; } .key-n00 { grid-area: n00; } .key-bk { grid-area: bk; }
        
        .key-c { 
            grid-area: btnC; 
            height: 100%;
            background-color: var(--milktea) !important;
            font-size: 2rem;
            border-radius: 15px;
        }

        /* --- 結果區域：強制九宮格 --- */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
            display: none; /* 初始隱藏 */
        }

        .coupon-card {
            background-color: var(--card-bg); border-radius: 15px;
            padding: 15px 5px; text-align: center; border: 1.5px solid transparent;
            display: flex; flex-direction: column; justify-content: center;
            transition: 0.3s;
            min-width: 0;
        }
        
        .coupon-card.best { border-color: var(--gold); position: relative; }
        .best-tag {
            font-size: 0.6rem; color: var(--gold);
            border: 1px solid var(--gold); border-radius: 10px;
            padding: 2px 8px; align-self: center; margin-bottom: 5px;
        }

        .coupon-name { font-size: 0.75rem; color: var(--gold); font-weight: bold; }
        .coupon-price { font-size: 1.4rem; color: var(--text-main); font-weight: bold; }
        .coupon-save { font-size: 0.7rem; color: var(--gold); height: 1rem; }
        .coupon-desc { font-size: 0.6rem; color: var(--text-main); opacity: 0.7; }

        .tooltip-area { margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--gold); display: none; }
        .tooltip-text { color: var(--text-main); font-size: 0.85rem; border-left: 3px solid var(--milktea); padding-left: 10px; }
        .init-view { text-align: center; color: var(--gold); margin-top: 30px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="display-area">
        <div class="label">書本售價</div>
        <div><span class="price-symbol">$</span><span id="displayVal" class="price-val">0</span></div>
    </div>

    <div class="keypad">
        <button class="key key-n7" onclick="press('7')">7</button>
        <button class="key key-n8" onclick="press('8')">8</button>
        <button class="key key-n9" onclick="press('9')">9</button>
        <button class="key key-n4" onclick="press('4')">4</button>
        <button class="key key-n5" onclick="press('5')">5</button>
        <button class="key key-n6" onclick="press('6')">6</button>
        <button class="key key-n1" onclick="press('1')">1</button>
        <button class="key key-n2" onclick="press('2')">2</button>
        <button class="key key-n3" onclick="press('3')">3</button>
        <button class="key key-n0" onclick="press('0')">0</button>
        <button class="key key-n00" onclick="press('00')">00</button>
        <button class="key key-bk" style="color: var(--gold);" onclick="back()">⌫</button>
        <button class="key key-c" onclick="cls()">C</button>
    </div>

    <div id="initInfo" class="init-view">點擊數字即時計算</div>
    <div id="results" class="results-grid"></div>
    <div id="tooltip" class="tooltip-area"><div id="bestNote" class="tooltip-text"></div></div>
</div>

<script>
    let currentInput = "0";
    const COST_PER_POINT = 166.5;

    function press(n) {
        if (currentInput === "0") currentInput = n;
        else if (currentInput.length < 6) currentInput += n;
        update();
        calculate(); // 即時計算
    }

    function back() {
        currentInput = currentInput.slice(0, -1);
        if (currentInput === "") currentInput = "0";
        update();
        calculate(); // 即時計算
    }

    function cls() {
        currentInput = "0"; update();
        document.getElementById('results').style.display = 'none';
        document.getElementById('tooltip').style.display = 'none';
        document.getElementById('initInfo').style.display = 'block';
    }

    function update() { document.getElementById('displayVal').innerText = currentInput; }

    function calculate() {
        const p = parseInt(currentInput);
        if (p === 0 || isNaN(p)) { cls(); return; }

        document.getElementById('initInfo').style.display = 'none';
        document.getElementById('results').style.display = 'grid'; // 強制九宮格顯示
        document.getElementById('tooltip').style.display = 'block';

        const pointsNeeded = Math.ceil(p / 250);
        const creditCost = pointsNeeded * COST_PER_POINT;

        const schemes = [
            { id: "unlimited50", name: "不限額折50", threshold: 0, calc: (p) => Math.max(0, p - 50), desc: "不限金額折$50" },
            { name: "滿250折50", threshold: 250, calc: (p) => p - 50, desc: "滿$250可用" },
            { name: "滿150折30", threshold: 150, calc: (p) => p - 30, desc: "滿$150可用" },
            { name: "滿100折25", threshold: 100, calc: (p) => p - 25, desc: "滿$100可用" },
            { name: "7折券", threshold: 0, calc: (p) => Math.round(p * 0.7), desc: "7折優惠券" },
            { name: "75折券", threshold: 0, calc: (p) => Math.round(p * 0.75), desc: "3本以上75折" },
            { name: "8折券", threshold: 0, calc: (p) => Math.round(p * 0.8), desc: "單本8折" },
            { id: "credit", name: "領書額度", threshold: 0, calc: (p) => creditCost, desc: `消耗 ${pointsNeeded} 點` },
            { name: "原價", threshold: 0, calc: (p) => p, desc: "無折扣" }
        ];

        let processed = schemes.map(s => {
            const isActive = p >= s.threshold;
            const finalPrice = isActive ? s.calc(p) : p;
            return { ...s, isActive, finalPrice, save: p - finalPrice };
        });

        processed.sort((a, b) => (a.finalPrice - b.finalPrice));

        const resDiv = document.getElementById('results');
        resDiv.innerHTML = processed.map((s, i) => {
            const isBest = s.isActive && i === 0;
            const priceLabel = s.id === "credit" ? s.finalPrice.toFixed(0) : s.finalPrice;
            return `
                <div class="coupon-card ${isBest ? 'best' : ''} ${!s.isActive ? 'disabled' : ''}">
                    ${isBest ? '<span class="best-tag">最划算</span>' : ''}
                    <div class="coupon-name">${s.name}</div>
                    <div class="coupon-price">$${s.isActive ? priceLabel : '-'}</div>
                    <div class="coupon-save">${s.isActive && s.save > 0 ? '省 $' + Math.floor(s.save) : ''}</div>
                    <div class="coupon-desc">${s.isActive ? s.desc : '未達門檻'}</div>
                </div>
            `;
        }).join('');

        const best = processed.find(s => s.isActive);
        document.getElementById('bestNote').innerText = best ? `${best.name}最划算，換算成本約 $${best.finalPrice}。` : "";
    }
</script>
</body>
</html>
